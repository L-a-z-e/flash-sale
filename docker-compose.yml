services:
  # ==================== Application ====================
  app:
    build: .
    container_name: flash-sale-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgresql:
        condition: service_healthy
      redis-master:
        condition: service_healthy
      kafka:
        condition: service_started

  # ==================== Mock PG ====================
  mock-pg:
    build: ../flash-sale-mock-pg
    container_name: flash-sale-mock-pg
    ports:
      - "8090:8090"

  # ==================== PostgreSQL ====================
  postgresql:
    image: postgres:18
    container_name: flash-sale-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: flashsale
      POSTGRES_USER: flashsale
      POSTGRES_PASSWORD: flashsale
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flashsale"]
      interval: 3s
      timeout: 2s
      retries: 5

  # ==================== Redis Sentinel ====================
  redis-master:
    image: redis:8
    container_name: flash-sale-redis-master
    ports:
      - "6389:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 2s
      retries: 5

  redis-replica1:
    image: redis:8
    container_name: flash-sale-redis-replica1
    command: redis-server --replicaof redis-master 6379 --appendonly yes
    depends_on:
      redis-master:
        condition: service_healthy

  redis-replica2:
    image: redis:8
    container_name: flash-sale-redis-replica2
    command: redis-server --replicaof redis-master 6379 --appendonly yes
    depends_on:
      redis-master:
        condition: service_healthy

  redis-sentinel1:
    image: redis:8
    container_name: flash-sale-redis-sentinel1
    volumes:
      - ./docker/redis/sentinel.conf:/etc/redis/sentinel.conf:ro
    command: sh -c "cp /etc/redis/sentinel.conf /tmp/sentinel.conf && redis-sentinel /tmp/sentinel.conf"
    depends_on:
      redis-master:
        condition: service_healthy

  redis-sentinel2:
    image: redis:8
    container_name: flash-sale-redis-sentinel2
    volumes:
      - ./docker/redis/sentinel.conf:/etc/redis/sentinel.conf:ro
    command: sh -c "cp /etc/redis/sentinel.conf /tmp/sentinel.conf && redis-sentinel /tmp/sentinel.conf"
    depends_on:
      redis-master:
        condition: service_healthy

  redis-sentinel3:
    image: redis:8
    container_name: flash-sale-redis-sentinel3
    volumes:
      - ./docker/redis/sentinel.conf:/etc/redis/sentinel.conf:ro
    command: sh -c "cp /etc/redis/sentinel.conf /tmp/sentinel.conf && redis-sentinel /tmp/sentinel.conf"
    depends_on:
      redis-master:
        condition: service_healthy

  # ==================== Kafka (KRaft) ====================
  kafka:
    image: apache/kafka:4.0.0
    container_name: flash-sale-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-logs
      CLUSTER_ID: flash-sale-kafka-cluster-001

  # ==================== Monitoring ====================
  prometheus:
    image: prom/prometheus:v3.3.1
    container_name: flash-sale-prometheus
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:12.0.1
    container_name: flash-sale-grafana
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_BASIC_ENABLED: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    depends_on:
      - prometheus

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: flash-sale-redis-exporter
    environment:
      REDIS_ADDR: redis://redis-master:6379
    depends_on:
      redis-master:
        condition: service_healthy

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: flash-sale-postgres-exporter
    environment:
      DATA_SOURCE_URI: postgresql:5432/flashsale?sslmode=disable
      DATA_SOURCE_USER: flashsale
      DATA_SOURCE_PASS: flashsale
    depends_on:
      postgresql:
        condition: service_healthy

volumes:
  postgres-data:
