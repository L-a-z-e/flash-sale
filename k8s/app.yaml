apiVersion: v1
kind: Service
metadata:
  name: flash-sale-app
  namespace: flash-sale
spec:
  selector:
    app: flash-sale-app
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flash-sale-app
  namespace: flash-sale
spec:
  replicas: 3
  selector:
    matchLabels:
      app: flash-sale-app
  template:
    metadata:
      labels:
        app: flash-sale-app
    spec:
      containers:
        - name: app
          image: flash-sale-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: k8s
          startupProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
